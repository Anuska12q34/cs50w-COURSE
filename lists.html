<!DOCTYPE html>
<html>
    <head>
        <title>lists</title>
    </head>
    <body>
        An Unordered list:
        <ul>
            <li>One item</li>
            <li>Two item</li>
        </ul>
        An Ordered list:
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ol>
    </body>
</html>
